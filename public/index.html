<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/svg+xml" href="/image/favicon/favicon.svg" />
    <link
      rel="icon"
      type="image/webp"
      sizes="16x16"
      href="./image/favicon/favicon-16x16.webp"
    />
    <link
      rel="icon"
      type="image/webp"
      sizes="32x32"
      href="./image/favicon/favicon-32x32.webp"
    />
    <link
      rel="icon"
      type="image/webp"
      sizes="64x64"
      href="./image/favicon/favicon-64x64.webp"
    />

    <title>toy-store</title>
    <script>
      const savedTheme = localStorage.getItem('theme');
      const themeToApply = savedTheme || 'light';
      document.documentElement.setAttribute('data-theme', themeToApply);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
  </body>
</html>

<!--! 🧭 Самый современный и надёжный вариант — это вариант скрипт в index.html до загрузки React -->
